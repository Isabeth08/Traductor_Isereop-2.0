<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐺👑Traductor de Isereop-Español🦌👤</title>

<link rel="icon" type="image/png" href="icono.png">

<style>
body {
    background: radial-gradient(circle at top, #1a1a1a, #000);
    color: white;
    font-family: Arial, sans-serif;
    text-align: center;
    padding: 20px;
}

h1 {
    text-shadow: 0 0 10px #ba0000;
}

textarea {
    width: 80%;
    height: 120px;
    background: #111;
    color: #fff;
    border: 1px solid #333;
    padding: 12px;
    margin: 10px;
    font-size: 16px;
    border-radius: 10px;
    resize: none;
}

button {
    background: #111;
    color: #ba0000;
    border: 1px solid #ba0000;
    padding: 10px 15px;
    margin: 5px;
    cursor: pointer;
    border-radius: 8px;
}

button:hover {
    background: #ba0000;
    color: black;
}
</style>
</head>

<body>

<h1>🐺👑Traductor de Isereop-Español🦌👤</h1>

<textarea id="entrada" placeholder="Escribe aquí..."></textarea><br>

<button onclick="traducirAutomatico()">⚡ Traducir Automático</button>
<button onclick="copiar()">📋 Copiar</button>
<button onclick="limpiar()">🧹 Limpiar</button>

<textarea id="salida" placeholder="Resultado..."></textarea>

<script>

// 🔥 DETECTOR INTELIGENTE
function detectarIdioma(texto){
    texto = texto.toLowerCase();
    let palabras = texto.split(/\s+/);

    let patronRaro = /[ⱥɇɨøʉɏåůŷ̂]/;
    let comunesES = ["el","la","los","las","un","una","de","que","y","en","a","es","no","se","por","con","su","para","como"];

    let scoreReina = 0;

    palabras.forEach(p => {
        if(patronRaro.test(p)) scoreReina += 3;
        if(!comunesES.includes(p)) scoreReina += 1;
        if(/(qw|qs|qy|ry|dy|ou|iw)/.test(p)) scoreReina += 1;
    });

    return scoreReina >= palabras.length ? "isereop" : "espanol";
}

// 🔤 BASE
const vocales = "aeiouy";
const consonantes = "bcdfghjklmnpqrstvwxyz";

// 🔁 MOVER LETRAS
function moverLetra(l){
    if(vocales.includes(l)){
        return vocales[(vocales.indexOf(l)+1)%vocales.length];
    }
    if(consonantes.includes(l)){
        return consonantes[(consonantes.indexOf(l)+1)%consonantes.length];
    }
    return l;
}

function revertirLetra(l){
    if(vocales.includes(l)){
        return vocales[(vocales.indexOf(l)-1+vocales.length)%vocales.length];
    }
    if(consonantes.includes(l)){
        return consonantes[(consonantes.indexOf(l)-1+consonantes.length)%consonantes.length];
    }
    return l;
}

// 👑 ESPAÑOL → ISEREOP
function aReina(){
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("¿") && texto.endsWith("?");

    texto = texto.replace("¿","").replace("?","");

    let palabras = texto.split(/\s+/);

    let resultado = palabras.map(p => {
        let traducida = "";
        for(let c of p) traducida += moverLetra(c);
        return traducida;
    }).join(" ");

    if(esPregunta) resultado = "Et-" + resultado + "-te";

    document.getElementById("salida").value = resultado;
}

// 🔁 ISEREOP → ESPAÑOL
function aEspanol(){
    let texto = document.getElementById("entrada").value.toLowerCase();

    let esPregunta = texto.startsWith("et-") && texto.endsWith("-te");

    texto = texto.replace("et-","").replace("-te","");

    let palabras = texto.split(/\s+/);

    let resultado = palabras.map(p => {
        let original = "";
        for(let c of p) original += revertirLetra(c);
        return original;
    }).join(" ");

    if(esPregunta) resultado = "¿" + resultado + "?";

    document.getElementById("salida").value = resultado;
}

// ⚡ AUTOMÁTICO
function traducirAutomatico(){
    let texto = document.getElementById("entrada").value;

    let idioma = detectarIdioma(texto);

    if(idioma === "isereop"){
        aEspanol();
    } else {
        aReina();
    }
}

// 🧹 EXTRA
function copiar(){
    let texto = document.getElementById("salida");
    texto.select();
    document.execCommand("copy");
}

function limpiar(){
    document.getElementById("entrada").value = "";
    document.getElementById("salida").value = "";
}

</script>

</body>
</html>
