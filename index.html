<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>🐺👑Traductor de Isereop-Español🦌👤</title>

<link rel="icon" href="icono.png">
<link rel="apple-touch-icon" href="icono.png">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: linear-gradient(135deg, #0a0a0a, #1a1a1a);
    color: white;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.app {
    width: 90%;
    max-width: 500px;
    background: rgba(20,20,20,0.9);
    border-radius: 20px;
    padding: 20px;
    box-shadow: 0 0 30px rgba(0,0,0,0.6);
}
textarea {
    width: 100%;
    height: 90px;
    background: #0d0d0d;
    color: #eaeaea;
    border: 1px solid #2a2a2a;
    border-radius: 12px;
    padding: 12px;
    margin: 10px 0;
    font-size: 14px;
}
.botones {
    display: flex;
    gap: 10px;
}
button {
    flex: 1;
    background: #1a1a1a;
    color: white;
    border: none;
    border-radius: 10px;
    padding: 10px;
    cursor: pointer;
}
button:hover {
    background: #ba0000;
}
.loading { opacity: 0.5; }

/* 🌗 SWITCH MODO */
.switch {
  position: relative;
  display: inline-block;
  width: 50px;
  height: 26px;
}

.switch input {
  display: none;
}

.slider {
  position: absolute;
  cursor: pointer;
  background-color: #444;
  border-radius: 34px;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  transition: 0.4s;
}

.slider:before {
    content: "🌙";
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
  position: absolute;
  height: 20px;
  width: 20px;
  left: 3px;
  bottom: 3px;
  background-color: white;
  border-radius: 50%;
  transition: 0.4s;
}

input:checked + .slider {
  background-color: #ba0000;
}

input:checked + .slider:before {
  transform: translateX(24px);
}

input:checked + .slider:before {
    content: "☀️";
}

/* 🌞 MODO CLARO GLOBAL */
.light {
    background: linear-gradient(135deg, #f5f5f5, #dddddd);
    color: black;
}

/* Caja principal */
.light .app {
    background: white;
    color: black;
}

/* Textareas */
.light textarea {
    background: #f0f0f0;
    color: black;
}

/* Botones */
.light button {
    background: #e0e0e0;
    color: black;
}

.light button:hover {
    background: #ba0000;
    color: white;
}

</style>
</head>

<body>
<div class="app">

<h1>🐺👑Traductor Isereop🦌👤</h1>

<textarea id="entrada" placeholder="Escribe aquí..."></textarea>

<div class="botones">
<button onclick="invertir()">Isereop ↔ Español</button>
<button onclick="copiar()">Copiar</button>
<button onclick="limpiar()">Limpiar</button>
<label class="switch">
  <input type="checkbox" id="modoToggle" onclick="toggleModo()">
  <span class="slider"></span>
</label>
</div>

<textarea id="salida"></textarea>

<script>

// =======================
// 🔥 DETECTOR INTELIGENTE
// =======================
function detectarIdioma(texto){
    texto = texto.toLowerCase().trim();

    if(texto.startsWith("et-") && texto.endsWith("-te")){
        return "isereop";
    }

    let palabras = texto.split(/\s+/);

    let comunesES = ["el","la","de","que","y","en","a","es","no"];
    let raro = /[ⱥɇɨøʉɏåŷ]/;

    let score = 0;

    palabras.forEach(p=>{
        if(raro.test(p)) score += 3;
        if(!comunesES.includes(p)) score += 1;
        if(/(qy|ry|dy|ou|iw)/.test(p)) score += 1;
    });

    return score >= palabras.length ? "isereop" : "espanol";
}

// =======================
// 🔤 BASE
// =======================
const vocales="aeiouy";
const consonantes="bcdfghjklmnpqrstvwxyz";

// =======================
// 📚 DICCIONARIO
// =======================
const diccionario={
    "esta":"itve",
    "ahi":"ejǫ",
    "aqui":"eryǫ",
    "alguien":"emhyoip",
    "confianza":"dupgoepbe",
    "mas":"nęt",
    "alice":"alice",
    "lucifer":"lucifer",
    "dios":"dios",
    "pingüino":"qophÿopu",
    "vergüenza":"wishÿipbe",
    "antigüedad":"epsohÿifef"
};

// =======================
// ❓ PREGUNTAS
// =======================
const preguntas={
    "quien":"rŷoip",
    "que":"rŷi",
    "donde":"fûpfi",
    "cuando":"dŷepfu",
    "cual":"dŷem",
    "como":"dûnu"
};

const preguntasInv=Object.fromEntries(
    Object.entries(preguntas).map(([k,v])=>[v,k])
);

// =======================
// ⏳ TIEMPOS
// =======================
const pasado={"a":"ⱥ","e":"ɇ","i":"ɨ","o":"ø","u":"ʉ","y":"ɏ"};
const pasadoInv={"ⱥ":"a","ɇ":"e","ɨ":"i","ø":"o","ʉ":"u","ɏ":"y"};

const futuro={"a":"å","e":"e̊","i":"i̊","o":"o̊","u":"ů","y":"ẙ"};
const futuroInv={"å":"a","e̊":"e","i̊":"i","o̊":"o","ů":"u","ẙ":"y"};

// =======================
// 🔁 LETRAS
// =======================
function moverLetra(l){
    if(vocales.includes(l)) return vocales[(vocales.indexOf(l)+1)%6];
    if(consonantes.includes(l)) return consonantes[(consonantes.indexOf(l)+1)%21];
    return l;
}

function revertirLetra(l){
    if(vocales.includes(l)) return vocales[(vocales.indexOf(l)-1+6)%6];
    if(consonantes.includes(l)) return consonantes[(consonantes.indexOf(l)-1+21)%21];
    return l;
}

// =======================
// 👑 TRADUCIR
// =======================
function aReina(){
    let texto=entrada.value.toLowerCase();
    let esPregunta=texto.startsWith("¿")&&texto.endsWith("?");

    texto=texto.replace(/[¿?]/g,"");

    let resultado=texto.split(" ").map(p=>{
        if(diccionario[p]) return diccionario[p];
        if(preguntas[p]) return preguntas[p];

        return [...p].map(moverLetra).join("");
    }).join(" ");

    if(esPregunta) resultado="Et-"+resultado+"-te";

    salida.value=resultado;
}

function aEspanol(){
    let texto=entrada.value.toLowerCase();
    let esPregunta=texto.startsWith("et-")&&texto.endsWith("-te");

    texto=texto.replace("et-","").replace("-te","");

    let resultado=texto.split(" ").map(p=>{
        if(preguntasInv[p]) return preguntasInv[p];

        return [...p].map(revertirLetra).join("");
    }).join(" ");

    if(esPregunta) resultado="¿"+resultado+"?";

    salida.value=resultado;
}

// =======================
// ⚡ AUTO
// =======================
function traducirAutomatico(){
    let idioma=detectarIdioma(entrada.value);

    if(idioma==="isereop"){
        aEspanol();
    }else{
        aReina();
    }
}

// =======================
// 🔧 EXTRA
// =======================
function copiar(){
    salida.select();
    document.execCommand("copy");
}

function limpiar(){
    entrada.value="";
    salida.value="";
}

function invertir(){
    let t=entrada.value;
    entrada.value=salida.value;
    salida.value=t;
    traducirAutomatico();
}

function toggleModo(){
    document.body.classList.toggle("light");

    if(document.body.classList.contains("light")){
        localStorage.setItem("modo", "light");
    } else {
        localStorage.setItem("modo", "dark");
    }
}

// =======================
// 🚀 TIEMPO REAL
// =======================
entrada.addEventListener("input", traducirAutomatico);

// 🔄 Cargar modo guardado
window.onload = function(){
    if(localStorage.getItem("modo") === "light"){
        document.body.classList.add("light");
        document.getElementById("modoToggle").checked = true;
    }
}

</script>

</div>
</body>
</html>
